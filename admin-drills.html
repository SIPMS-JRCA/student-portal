<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Drill Schedule | SIPMS</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/dashboard-v2.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/admin-drills.css">

</head>

<body>

<header class="topbar-v2">

<div class="topbar-left">

<button id="menuBtn" class="icon-btn">

<i class="fa-solid fa-bars"></i>

</button>

<div class="brand">

<img src="images/JRCA LOGO.jpg"
class="brand-logo">

<div class="brand-text">

<h2 class="desktop-title">

JESUS REIGNS CHRISTIAN ACADEMY

</h2>

<h2 class="mobile-title">

JRCA

</h2>

<span class="desktop-subtitle">

Safety Information and Preparedness Management System

</span>

<span class="mobile-subtitle">

SIPMS

</span>

</div>

</div>

</div>

<div class="topbar-right">

<button
id="notificationBell"
class="icon-btn">

<i class="fa-solid fa-bell"></i>

<span id="notificationCount">

0

</span>

</button>

</div>

</header>

<div class="dashboard">

<aside class="sidebar"></aside>

<main class="content">

<section class="page-header">

<h1>

Drill Schedule

</h1>

<p>

Create and manage school emergency drills.

</p>

</section>

<div class="card">

<h2>

<i class="fa-solid fa-calendar-days"></i>

Create Drill Schedule

</h2>

<br>

<input
id="drillTitle"
type="text"
placeholder="Drill title">

<br><br>

<select id="drillType">

<option>

Fire Drill

</option>

<option>

Earthquake Drill

</option>

<option>

Lockdown Drill

</option>

<option>

Evacuation Drill

</option>

</select>

<br><br>

<input
id="drillLocation"
type="text"
placeholder="Location">

<br><br>

<input
id="drillDate"
type="date">

<br><br>

<input
id="drillTime"
type="time">

<br><br>

<button id="postDrillBtn">

<i class="fa-solid fa-paper-plane"></i>

Create Drill

</button>

</div>

<br>

<div class="card">

<h2>

<i class="fa-solid fa-list"></i>

Scheduled Drills

</h2>

<br>

<div id="drillList">

Loading...

</div>

</div>

</main>

</div>

<script type="module">

import { loadAdminSidebar }
from "./js/components/adminSidebar.js";

loadAdminSidebar("drills");

</script>

<script
type="module"
src="js/pages/admin-drills.js">

</script>

</body>

</html>
