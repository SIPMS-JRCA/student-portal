<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Safety Guide Manager | SIPMS</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/dashboard-v2.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/admin-guides.css">

</head>

<body>

<header class="topbar-v2">

<div class="topbar-left">

<button id="menuBtn" class="icon-btn">

<i class="fa-solid fa-bars"></i>

</button>

<div class="brand">

<img src="images/JRCA LOGO.jpg"
class="brand-logo">

<div class="brand-text">

<h2 class="desktop-title">

JESUS REIGNS CHRISTIAN ACADEMY

</h2>

<h2 class="mobile-title">

JRCA

</h2>

<span class="desktop-subtitle">

Safety Information and Preparedness Management System

</span>

<span class="mobile-subtitle">

SIPMS

</span>

</div>

</div>

</div>

<div class="topbar-right">

<button
id="notificationBell"
class="icon-btn">

<i class="fa-solid fa-bell"></i>

<span id="notificationCount">

0

</span>

</button>

</div>

</header>

<div class="dashboard">

<aside class="sidebar"></aside>

<main class="content">

<section class="page-header">

<h1>

Safety Guide Manager

</h1>

<p>

Create and manage safety guides available to students.

</p>

</section>

<div class="card">

<h2>

<i class="fa-solid fa-book-open"></i>

Create Safety Guide

</h2>

<br>

<input
id="guideTitle"
type="text"
placeholder="Guide title">

<br><br>

<textarea
id="guideContent"
rows="8"
placeholder="Write the safety guide..."></textarea>

<br><br>

<select id="guideCategory">

<option>

Fire Safety

</option>

<option>

Earthquake

</option>

<option>

Flood

</option>

<option>

Typhoon

</option>

<option>

First Aid

</option>

<option>

General Safety

</option>

</select>

<br><br>

<button id="postGuideBtn">

<i class="fa-solid fa-paper-plane"></i>

Publish Guide

</button>

</div>

<br>

<div class="card">

<h2>

<i class="fa-solid fa-book"></i>

Published Guides

</h2>

<br>

<div id="guideList">

Loading...

</div>

</div>

</main>

</div>

<script type="module">

import { loadAdminSidebar }
from "./js/components/adminSidebar.js";

loadAdminSidebar("guides");

</script>

<script
type="module"
src="js/pages/admin-guides.js">

</script>

</body>

</html>
