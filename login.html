<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Safety First | Login</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">

            <center>
                <img src="images/JRCA LOGO.jpg" alt="JRCA Logo">
            </center>

            <h3>JESUS REIGNS CHRISTIAN ACADEMY's</h3>

            <p>

                Safety Information & Preparedness Management System

            </p>

        </div>

        <form id="loginForm">

            <div class="form-group">

                <label>Email Address</label>

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Enter your password"
                    required>

            </div>

            <button
                type="button"
                id="loginBtn"
                class="primary-btn">

                Log In

            </button>

        </form>

        <div class="auth-footer">

            <p>

                Don't have an account?

                <a href="signup.html">

                    Create One

                </a>

            </p>

        </div>

    </div>

</div>

<script type="module" src="js/auth.js"></script>

</body>

</html>
