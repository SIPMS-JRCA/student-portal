<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Incident Reports | Admin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/dashboard-v2.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/admin-incidents.css">

</head>

<body>

<header class="topbar-v2">

<div class="topbar-left">

<button id="menuBtn" class="icon-btn">

<i class="fa-solid fa-bars"></i>

</button>

<div class="brand">

<img
src="images/JRCA LOGO.jpg"
class="brand-logo">

<div class="brand-text">

<h2 class="desktop-title">

JESUS REIGNS CHRISTIAN ACADEMY

</h2>

<h2 class="mobile-title">

JRCA

</h2>

<span class="desktop-subtitle">

Safety Information and Preparedness Management System

</span>

<span class="mobile-subtitle">

SESIS

</span>

</div>

</div>

</div>

<div class="topbar-right">

<button id="notificationBell"
class="icon-btn">

<i class="fa-solid fa-bell"></i>

<span id="notificationCount">

0

</span>

</button>

</div>

</header>

<div class="dashboard">

<aside class="sidebar"></aside>

<main class="content">

<section class="page-header">

<h1>

Incident Reports

</h1>

<p>

Review, manage and resolve student incident reports.

</p>

</section>

<div class="card">

<div class="toolbar">

<input
type="text"
id="searchReport"
placeholder="Search by student, incident or location...">

<select id="statusFilter">

<option value="All">

All Reports

</option>

<option value="Pending">

Pending

</option>

<option value="Investigating">

Investigating

</option>

<option value="Resolved">

Resolved

</option>

</select>

</div>

</div>

<br>

<div id="reportsContainer">

<div class="loading">

Loading incident reports...

</div>

</div>

</main>

</div>

<script type="module">

import { loadAdminSidebar }
from "./js/components/adminSidebar.js";

loadAdminSidebar("incidents");

</script>

<script
type="module"
src="js/pages/admin-incidents.js">

</script>

</body>

</html>
