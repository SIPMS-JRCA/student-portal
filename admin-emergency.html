<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emergency Alerts | Admin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/dashboard-v2.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/admin-emergency.css">

</head>

<body>

<header class="topbar-v2">

<div class="topbar-left">

<button id="menuBtn" class="icon-btn">
<i class="fa-solid fa-bars"></i>
</button>

<div class="brand">

<img src="images/JRCA LOGO.jpg" class="brand-logo">

<div class="brand-text">

<h2 class="desktop-title">
JESUS REIGNS CHRISTIAN ACADEMY
</h2>

<h2 class="mobile-title">
JRCA
</h2>

<span class="desktop-subtitle">
Safety Information and Preparedness Management System
</span>

<span class="mobile-subtitle">
SESIS
</span>

</div>

</div>

</div>

<div class="topbar-right">

<button id="notificationBell" class="icon-btn">

<i class="fa-solid fa-bell"></i>

<span id="notificationCount">0</span>

</button>

</div>

</header>

<div class="dashboard">

<aside class="sidebar"></aside>

<main class="content">

<section class="page-header">

<h1>

Emergency Alerts

</h1>

<p>

Create and manage emergency alerts for all students.

</p>

</section>

<div class="card">

<h2>

<i class="fa-solid fa-triangle-exclamation"></i>

Create Emergency Alert

</h2>

<br>

<input
id="alertTitle"
type="text"
placeholder="Alert title">

<br><br>

<textarea
id="alertMessage"
rows="6"
placeholder="Write the emergency alert..."></textarea>

<br><br>

<select id="alertLevel">

<option value="Emergency">

🚨 Emergency

</option>

<option value="Warning">

⚠ Warning

</option>

<option value="Advisory">

ℹ Advisory

</option>

</select>

<br><br>

<button id="sendAlertBtn">

<i class="fa-solid fa-paper-plane"></i>

Send Alert

</button>

</div>

<br>

<div class="card">

<h2>

<i class="fa-solid fa-clock-rotate-left"></i>

Recent Emergency Alerts

</h2>

<br>

<div id="alertList">

Loading...

</div>

</div>

</main>

</div>

<script type="module">

import { loadAdminSidebar }
from "./js/components/adminSidebar.js";

loadAdminSidebar("emergency");

</script>

<script
type="module"
src="js/pages/admin-emergency.js">

</script>

</body>

</html>
