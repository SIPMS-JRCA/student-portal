<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile | Safety First</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">

</head>

<body>

<header class="topbar">

    <div class="logo">

        <img src="images/logo.png" class="logo-img">

        <span>Safety First</span>

    </div>

    <div class="topbar-right">

        <span id="welcomeUser">

            Welcome

        </span>

        <button id="logoutBtn" class="logout-btn">

            <i class="fa-solid fa-right-from-bracket"></i>

            Sign Out

        </button>

    </div>

</header>

<div class="dashboard">

    <aside class="sidebar"></aside>

    <main class="content">

        <section class="profile-card">

            <h1>
                <i class="fa-solid fa-user"></i>
                My Profile
            </h1>

            <div class="profile-header">

                <img
                    id="profileImage"
                    src="images/default-profile.png"
                    alt="Profile Picture"
                    class="profile-image"
            >

                <button
                    id="changePhotoBtn"
                    class="secondary-btn"
            >
                    Change Photo
                </button>

            </div>

            <form class="profile-form">

                <div class="form-group">

                    <label for="username">Username</label>

                    <input
                        type="text"
                        id="username"
                >

                </div>

                <div class="form-group">

                    <label for="email">Email</label>

                    <input
                        type="email"
                        id="email"
                        readonly
                >

                </div>

                <div class="form-group">

                    <label for="role">Role</label>

                    <input
                        type="text"
                        id="role"
                        readonly
                >

                </div>

                <div class="form-group">

                    <label for="bio">Bio</label>

                    <textarea
                        id="bio"
                        rows="4"
                    ></textarea>

                </div>

                <div class="button-group">

                    <button
                        type="button"
                        id="saveProfile"
                        class="primary-btn"
                >
                        Save Changes
                    </button>

                    <button
                        type="button"
                        id="changePassword"
                        class="secondary-btn"
                >
                        Change Password
                    </button>

                </div>

            </form>

        </section>

    </main>

</div>

<script type="module" src="js/pages/profile.js"></script>

<script type="module">

import { loadStudentSidebar }
from "./js/components/studentSidebar.js";

loadStudentSidebar("profile");

</script>

</body>

</html>
