<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Advisories | SIPMS</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/dashboard-v2.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/admin-weather.css">

</head>

<body>

<header class="topbar-v2">

<div class="topbar-left">

<button id="menuBtn" class="icon-btn">
<i class="fa-solid fa-bars"></i>
</button>

<div class="brand">

<img src="images/JRCA LOGO.jpg" class="brand-logo">

<div class="brand-text">

<h2 class="desktop-title">

JESUS REIGNS CHRISTIAN ACADEMY

</h2>

<h2 class="mobile-title">

JRCA

</h2>

<span class="desktop-subtitle">

Safety Information and Preparedness Management System

</span>

<span class="mobile-subtitle">

SIPMS

</span>

</div>

</div>

</div>

<div class="topbar-right">

<button id="notificationBell" class="icon-btn">

<i class="fa-solid fa-bell"></i>

<span id="notificationCount">0</span>

</button>

</div>

</header>

<div class="dashboard">

<aside class="sidebar"></aside>

<main class="content">

<section class="page-header">

<h1>

Weather Advisories

</h1>

<p>

Create and manage weather advisories for the school community.

</p>

</section>

<div class="card">

<h2>

<i class="fa-solid fa-cloud-sun-rain"></i>

Create Weather Advisory

</h2>

<br>

<input
id="weatherTitle"
type="text"
placeholder="Weather advisory title">

<br><br>

<textarea
id="weatherMessage"
rows="6"
placeholder="Enter weather advisory..."></textarea>

<br><br>

<select id="weatherLevel">

<option value="Information">

Information

</option>

<option value="Heavy Rain">

Heavy Rain

</option>

<option value="Typhoon">

Typhoon

</option>

<option value="Flood">

Flood

</option>

<option value="Extreme Heat">

Extreme Heat

</option>

</select>

<br><br>

<button id="postWeatherBtn">

<i class="fa-solid fa-paper-plane"></i>

Post Advisory

</button>

</div>

<br>

<div class="card">

<h2>

<i class="fa-solid fa-clock-rotate-left"></i>

Recent Advisories

</h2>

<br>

<div id="weatherList">

Loading...

</div>

</div>

</main>

</div>

<script type="module">

import { loadAdminSidebar }
from "./js/components/adminSidebar.js";

loadAdminSidebar("weather");

</script>

<script type="module"
src="js/pages/admin-weather.js">

</script>

</body>

</html>
