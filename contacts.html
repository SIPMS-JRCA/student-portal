<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Emergency Contacts | Safety First</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/theme.css">

    <link rel="stylesheet" href="css/dashboard-v2.css">

    <link rel="stylesheet" href="css/contacts.css">
    
</head>

<body>

<header class="topbar-v2">

    <div class="brand">

        <img src="images/JRCA LOGO.jpg" class="brand-logo">

        <div>

            <h2>JESUS REIGNS CHRISTIAN ACADEMY</h2>

            <span>Safety Information and Preparedness Management System</span>

        </div>

    </div>

    <div class="topbar-actions">

        <button id="notificationBell" class="icon-btn">

            <i class="fa-solid fa-bell"></i>

            <span id="notificationCount">0</span>

        </button>

        <div class="user-info">

            <div class="avatar">

                <i class="fa-solid fa-user"></i>

            </div>

            <div>

                <strong id="welcomeUser">

                    Welcome

                </strong>

                <p>Student</p>

            </div>

        </div>

        <button id="logoutBtn" class="logout-btn">

            <i class="fa-solid fa-right-from-bracket"></i>

            Sign Out

        </button>

    </div>

</header>

<div id="notificationPanel" class="notification-panel">

    <h3>Notifications</h3>

    <div id="notificationList">

        No notifications.

    </div>

</div>

<div class="dashboard">

    <aside class="sidebar"></aside>

    <main class="content">

        <section class="page-header">

            <h1>
                📞 Emergency Contacts
            </h1>

            <p>
                Quick access to important emergency hotline numbers.
            </p>

        </section>

        <section class="contacts-grid">

        </section>

    </main>

</div>

<script type="module">

import { loadStudentSidebar }
from "./js/components/studentSidebar.js";

loadStudentSidebar("contacts");

</script>

<script type="module" src="js/pages/contacts.js"></script>

<script type="module" src="js/components/notifications.js"></script>

</body>

</html>
